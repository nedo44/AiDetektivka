services:
  app:
    build: .
    env_file:
      - .env
    environment:
      - PORT=8000
      - REDIS_URL=redis://cache:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - cache
    mem_limit: 384m
  cache:
    image: redis:7-alpine
    mem_limit: 384m
